my_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      threads: 3
      # Using Env Var if available (Docker), else default to localhost (VS Code)
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      
      
      port: {{ env_var('DB_PORT', 5432) | int }}
      
      user: "{{ env_var('DB_USER', 'postgres') }}"
      
      #  Using Env Variable, else default to 'root' (Local Dev Password)
      pass: "{{ env_var('DB_PASS', 'root') }}"
      
      dbname: postgres
      schema: staging
