services:
  postgres:
    image: postgres:16
    container_name: pipeline_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - my_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 5

  pipeline:
    build: .
    container_name: pipeline_app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    container_name: pipeline_dbt
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./dbt_project:/usr/app/dbt
      - ./dbt_profiles:/root/.dbt
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - DB_PORT=${POSTGRES_PORT}
      - DB_NAME=${POSTGRES_DB}

volumes:
  my_pgdata:
    external: true



